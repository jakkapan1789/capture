name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch rather than queueing them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build

  rust:
    # The point of this job: the Windows code paths have never been compiled on
    # a Mac, and cross-compiling to Windows needs a resource compiler that is not
    # available there. A real Windows runner is the only honest check.
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # `tauri-build` reads `frontendDist`, so the bundle has to exist first.
      - name: Build frontend
        run: npm run build
      - name: Build
        run: cargo build --manifest-path src-tauri/Cargo.toml
      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
